name: Continuous Integration

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  # Job 1: Linting and Code Quality (Enforced on Windows environment)
  lint:
    name: Lint & Formatting (Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check code formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy linter
        run: cargo clippy --all-targets --all-features -- -D warnings

  # Job 2: Security Vulnerability Audit (Using fast binary installation)
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-binstall
        run: curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install.sh | sh

      - name: Install cargo-audit via binstall
        run: cargo binstall --deploy-keys --force cargo-audit -y

      - name: Run Audit
        run: cargo audit

  # Job 3: Native Test Execution
  test:
    name: Windows Test Suite
    needs: [lint, security] # Only runs if linting and security checks pass
    runs-on: windows-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Rust dependency cache
        uses: Swatinem/rust-cache@v2

      - name: Run native Windows tests
        run: cargo test --all-features --workspace